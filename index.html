<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monokrome Media - Coming Soon</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #000;
            --fg: #fff;
            --muted: rgba(255, 255, 255, 0.72);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background-color: var(--bg);
            color: var(--fg);
            font-family: "Avenir Next", "Helvetica Neue", sans-serif;
            text-align: center;
        }

        main {
            width: min(100%, 760px);
        }

        img {
            display: block;
            width: min(100%, 640px);
            height: auto;
            margin: 0 auto;
        }

        p {
            margin: 1.5rem 0 0;
            font-size: 0.82rem;
            letter-spacing: 0.38em;
            text-transform: uppercase;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main>
        <img src="assets/monokrome-logo.png" alt="Monokrome logo">
        <p>Coming Soon</p>
    </main>
</body>
</html>
